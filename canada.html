function renderCarrierCanvas(carriers,phoneLte){
  var allBands=[];var seen={};
  carriers.forEach(function(c){c.bands.forEach(function(b){if(!seen[b]){seen[b]=1;allBands.push(b)}})});
  allBands.sort(function(a,b){return a-b});

  var cols=[{label:'Carrier',w:130},{label:'Type',w:65},{label:'Network',w:80},{label:'Region',w:100}];
  allBands.forEach(function(b){cols.push({label:'B'+b,sub:bandFreq[b]||'',w:55,band:b})});
  cols.push({label:'Match',w:60},{label:'VoLTE',w:70},{label:'Notes',w:160});

  var totalW=cols.reduce(function(s,c){return s+c.w},0);
  var totalH=HDR_H+carriers.length*ROW_H+2;

  var cvs=document.createElement('canvas');

  cvs.style.width=totalW+'px';cvs.style.height=totalH+'px';
  var ctx=cvs.getContext('2d');ctx.scale(DPR,DPR);

  // Header
  ctx.fillStyle='#1565C0';ctx.fillRect(0,0,totalW,HDR_H);
  ctx.textBaseline='middle';
  var x=0;
  cols.forEach(function(c){
    ctx.fillStyle='#fff';ctx.font=HDR_FONT;
    if(c.sub!==undefined){
      ctx.fillText(c.label,x+4,HDR_H/2-6);
      ctx.font='10px "Segoe UI",sans-serif';ctx.globalAlpha=0.7;
      ctx.fillText(c.sub,x+4,HDR_H/2+8);ctx.globalAlpha=1;
    }else ctx.fillText(c.label,x+4,HDR_H/2);
    x+=c.w;

  // Rows
  carriers.forEach(function(c,i){
    var y=HDR_H+i*ROW_H;
    ctx.fillStyle=i%2===0?'#fff':'#f5f5f5';ctx.fillRect(0,y,totalW,ROW_H);
    ctx.strokeStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(0,y+ROW_H);ctx.lineTo(totalW,y+ROW_H);ctx.stroke();

    var m=getMatch(phoneLte,c.bands);
    var cx=0;
    cols.forEach(function(col,ci){
      ctx.font=FONT;ctx.textBaseline='middle';ctx.textAlign='left';
      var ty=y+ROW_H/2;
      if(ci===0){ctx.fillStyle='#212121';ctx.font='bold '+FONT;ctx.fillText(c.name,cx+4,ty)}
      else if(ci===1){ctx.fillStyle='#212121';ctx.fillText(c.type,cx+4,ty)}
      else if(ci===2){ctx.fillStyle='#212121';ctx.fillText(c.net,cx+4,ty)}
      else if(ci===3){ctx.fillStyle='#616161';ctx.font='12px "Segoe UI",sans-serif';ctx.fillText(c.region||'',cx+4,ty)}
      else if(col.band!==undefined){
        var band=col.band;
        var carrierHas=c.bands.indexOf(band)!==-1;
        var phoneHas=phoneLte.indexOf(band)!==-1;
        if(carrierHas&&phoneHas){
          ctx.fillStyle='#E8F5E9';ctx.fillRect(cx,y,col.w,ROW_H);
          ctx.fillStyle='#4CAF50';ctx.font='bold 11px "Segoe UI",sans-serif';ctx.fillText('BOTH',cx+8,ty);
        }else if(carrierHas){
          ctx.fillStyle='#FFEBEE';ctx.fillRect(cx,y,col.w,ROW_H);
          ctx.fillStyle='#F44336';ctx.font='11px "Segoe UI",sans-serif';ctx.fillText('MISS',cx+8,ty);
        }
      }else if(col.label==='Match'){
        var bg=m.pct>=40?'#E8F5E9':m.pct>=12?'#FFF3E0':'#FFEBEE';
        var fg=m.pct>=40?'#4CAF50':m.pct>=12?'#FF9800':'#F44336';
        ctx.fillStyle=bg;ctx.fillRect(cx+2,y+4,col.w-4,ROW_H-8);
        ctx.fillStyle=fg;ctx.font='bold 12px "Segoe UI",sans-serif';ctx.textAlign='center';
        ctx.fillText(m.pct+'%',cx+col.w/2,ty);ctx.textAlign='left';
      }else if(col.label==='VoLTE'){
        var vbg=c.volte==='Required'?'#FFEBEE':c.volte==='Whitelist'?'#FFF3E0':'#E8F5E9';
        var vfg=c.volte==='Required'?'#F44336':c.volte==='Whitelist'?'#FF9800':'#4CAF50';
        ctx.fillStyle=vbg;ctx.fillRect(cx+2,y+6,col.w-4,ROW_H-12);
        ctx.fillStyle=vfg;ctx.font='bold 11px "Segoe UI",sans-serif';ctx.textAlign='center';
        ctx.fillText(c.volte,cx+col.w/2,ty);ctx.textAlign='left';
      }else if(col.label==='Notes'){
        ctx.fillStyle='#616161';ctx.font='11px "Segoe UI",sans-serif';
        var txt=c.notes||'';if(txt.length>28)txt=txt.substring(0,26)+'...';
        ctx.fillText(txt,cx+4,ty);
      }
      cx+=col.w;
    });
  });
  return{canvas:cvs,count:carriers.length};
}

function renderProvCanvas(){
  var cols=[
    {label:'Province',w:170},{label:'Pop',w:60},{label:'Best Carrier',w:100},{label:'Regional',w:130},
    {label:'B4',w:55},{label:'B5',w:55},{label:'B7',w:55},{label:'B12',w:55},{label:'B13',w:55},{label:'B66',w:55},
    {label:'Density',w:65}
  ];
  var totalW=cols.reduce(function(s,c){return s+c.w},0);
  var totalH=HDR_H+provinces.length*ROW_H+2;
  var cvs=document.createElement('canvas');
  cvs.width=totalW*DPR;cvs.height=totalH*DPR;
  cvs.style.width=totalW+'px';cvs.style.height=totalH+'px';
  var ctx=cvs.getContext('2d');ctx.scale(DPR,DPR);

  ctx.fillStyle='#1565C0';ctx.fillRect(0,0,totalW,HDR_H);
  ctx.font=HDR_FONT;ctx.fillStyle='#fff';ctx.textBaseline='middle';
  var hx=0;cols.forEach(function(c){ctx.fillText(c.label,hx+4,HDR_H/2);hx+=c.w});

  var ratingColor=function(r){return r==='Strong'?'#4CAF50':r==='Moderate'?'#FF9800':r==='Weak'?'#F44336':'#9E9E9E'};

  provinces.forEach(function(pv,i){
    var y=HDR_H+i*ROW_H;
    var isSel=selectedProv===pv.p;
    ctx.fillStyle=isSel?'#E3F2FD':i%2===0?'#fff':'#f5f5f5';
    ctx.fillRect(0,y,totalW,ROW_H);
    ctx.strokeStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(0,y+ROW_H);ctx.lineTo(totalW,y+ROW_H);ctx.stroke();

    var ty=y+ROW_H/2;var cx=0;
    // Province name
    ctx.fillStyle=isSel?'#0D47A1':'#212121';ctx.font='bold '+FONT;ctx.textBaseline='middle';
    ctx.fillText(pv.p,cx+4,ty);cx+=cols[0].w;
    // Pop
    ctx.fillStyle='#616161';ctx.font='12px "Segoe UI",sans-serif';
    ctx.fillText(pv.pop,cx+4,ty);cx+=cols[1].w;
    // Best
    ctx.fillStyle='#212121';ctx.font=FONT;
    ctx.fillText(pv.best,cx+4,ty);cx+=cols[2].w;
    // Regional
    ctx.fillStyle='#616161';ctx.font='12px "Segoe UI",sans-serif';
    var reg=pv.regional||'';if(reg.length>20)reg=reg.substring(0,18)+'...';
    ctx.fillText(reg,cx+4,ty);cx+=cols[3].w;
    // Band ratings
    [pv.b4,pv.b5,pv.b7,pv.b12,pv.b13,pv.b66].forEach(function(r,bi){
      ctx.fillStyle=ratingColor(r);
      ctx.beginPath();ctx.arc(cx+14,ty,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#212121';ctx.font='11px "Segoe UI",sans-serif';
      ctx.fillText(r,cx+22,ty);
      cx+=cols[4+bi].w;
    });
    // Density
    ctx.fillStyle='#212121';ctx.font=FONT;
    ctx.fillText(pv.ur,cx+4,ty);
  });

  return{canvas:cvs,rowH:ROW_H,hdrH:HDR_H};
}

    ['Province coverage: WhistleOut.ca; comparecellular.ca; planhub.ca',
     'Band deployment: SmartphonePlans.ca; signalbooster.com; onesdr.com',
     'Telus covers 99% of Canadian population.',
     'Rogers covers 97% of Canadian population.',
     'SaskTel covers 57% of Saskatchewan by area (best in-province).',
     'Eastlink: 100% LTE network in Atlantic Canada.',
     'Fizz 3G shutdown: July 31, 2025 (confirmed by Videotron).',
     'Data compiled March 2026.'
    ].forEach(function(s){html+='<div>'+s+'</div>'});
    html+='</div>';
  }

  // Footer
  html+='<div class="footer">';
  html+='KEITEX Telecomms — Canada Carrier Deep Dive — Data compiled March 2026';
  html+='<i>Prepared by KEITEX Research Department — Senior Data Analyst Jesse Ashida</i>';
  html+='</div>';

  content.innerHTML=html;

  // Bind phone buttons
  document.querySelectorAll('[data-phone]').forEach(function(btn){
    btn.onclick=function(){currentPhone=this.getAttribute('data-phone');render()};
  });

  // Bind close
  var cb=document.getElementById('closeProv');
  if(cb)cb.onclick=function(){selectedProv=null;render()};

  // Render canvases
  if(currentTab==='carriers'){
    var wrap=document.getElementById('carrierWrap');
    if(wrap){
      var ph2=getPhone(currentPhone);
      var result=renderCarrierCanvas(caCarriers,ph2.l);
      wrap.innerHTML='';wrap.appendChild(result.canvas);
    }
  }
  if(currentTab==='provinces'){
    var pw=document.getElementById('provWrap');
    if(pw){
      var pr=renderProvCanvas();
      pw.innerHTML='';pw.appendChild(pr.canvas);
      pr.canvas.onclick=function(e){
        var rect=pr.canvas.getBoundingClientRect();
        var y=e.clientY-rect.top;
        if(y<pr.hdrH)return;
        var idx=Math.floor((y-pr.hdrH)/pr.rowH);
        if(idx>=0&&idx<provinces.length){
          var clicked=provinces[idx].p;
          selectedProv=selectedProv===clicked?null:clicked;
          render();
        }
      };
    }
  }
}

render();

// DevTools detection
(function(){
  var devOpen=false;
  var el=new Image();
  Object.defineProperty(el,'id',{get:function(){devOpen=true}});
  setInterval(function(){
    devOpen=false;console.log('%c','',el);
    if(devOpen){document.body.style.opacity='0.15';document.body.style.pointerEvents='none'}
    else{document.body.style.opacity='1';document.body.style.pointerEvents='auto'}
  },2000);
})();
</script>
</body>
</html>

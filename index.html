// ==================== HELPERS ====================
function getPhone(id){return phones.find(function(p){return p.i===id})}
function getMatch(phoneLte,carrierBands){
  var m=carrierBands.filter(function(b){return phoneLte.indexOf(b)!==-1}).length;
  var t=carrierBands.length;
  return{matched:m,total:t,pct:t>0?Math.round(m/t*100):0};
}
function getAllBands(carriers){
  var s={};carriers.forEach(function(c){c.bands.forEach(function(b){s[b]=1})});
  return Object.keys(s).map(Number).sort(function(a,b){return a-b});
}

// ==================== WATERMARK ====================
function drawWatermark(){
  var overlay=document.getElementById('wmOverlay');
  overlay.innerHTML='';
  var cvs=document.createElement('canvas');
  cvs.width=window.innerWidth;cvs.height=window.innerHeight;
  var ctx=cvs.getContext('2d');
  ctx.font='bold 28px "Segoe UI", sans-serif';
  ctx.fillStyle='#0D47A1';
  ctx.globalAlpha=1;
  var text='KEITEX TELECOMMS';
  for(var y=40;y<cvs.height;y+=180){
    for(var x=-100;x<cvs.width;x+=350){
      ctx.save();ctx.translate(x,y);ctx.rotate(-0.35);ctx.fillText(text,0,0);ctx.restore();
    }
  }
  overlay.appendChild(cvs);
}
drawWatermark();
window.addEventListener('resize',drawWatermark);

    var y=HDR_H+i*ROW_H;
    ctx.fillStyle=i%2===0?'#fff':'#f5f5f5';ctx.fillRect(0,y,totalW,ROW_H);
    ctx.strokeStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(0,y+ROW_H);ctx.lineTo(totalW,y+ROW_H);ctx.stroke();

    var m=getMatch(phoneLte,c.bands);
    var cx=0;
    cols.forEach(function(col,ci){
      ctx.font=FONT;ctx.textBaseline='middle';
      var ty=y+ROW_H/2;
      if(ci===0){ctx.fillStyle='#212121';ctx.font='bold '+FONT;ctx.fillText(c.name,cx+4,ty)}
      else if(ci===1){ctx.fillStyle='#212121';ctx.fillText(c.type,cx+4,ty)}
      else if(ci===2){ctx.fillStyle='#212121';ctx.fillText(c.net,cx+4,ty)}
      else if(col.band!==undefined){
        var band=col.band;
        var carrierHas=c.bands.indexOf(band)!==-1;
        var phoneHas=phoneLte.indexOf(band)!==-1;
        if(carrierHas&&phoneHas){
          ctx.fillStyle='#E8F5E9';ctx.fillRect(cx,y,col.w,ROW_H);
          ctx.fillStyle='#4CAF50';ctx.font='bold 11px "Segoe UI", sans-serif';ctx.fillText('BOTH',cx+8,ty);
        }else if(carrierHas){
          ctx.fillStyle='#FFEBEE';ctx.fillRect(cx,y,col.w,ROW_H);
          ctx.fillStyle='#F44336';ctx.font='11px "Segoe UI", sans-serif';ctx.fillText('MISS',cx+8,ty);
        }
      }else if(col.label==='Match'){
        var bg=m.pct>=40?'#E8F5E9':m.pct>=12?'#FFF3E0':'#FFEBEE';
        var fg=m.pct>=40?'#4CAF50':m.pct>=12?'#FF9800':'#F44336';
        ctx.fillStyle=bg;ctx.fillRect(cx+2,y+4,col.w-4,ROW_H-8);
        ctx.fillStyle=fg;ctx.font='bold 12px "Segoe UI", sans-serif';ctx.textAlign='center';
        ctx.fillText(m.pct+'%',cx+col.w/2,ty);ctx.textAlign='left';
      }else if(col.label==='Notes'){
        ctx.fillStyle='#616161';ctx.font='12px "Segoe UI", sans-serif';ctx.fillText(c.notes||'',cx+4,ty);
      }
      cx+=col.w;
    });
  });

  return{canvas:cvs,count:filtered.length};
}

function renderStateCanvas(states,phoneLte){
  var cols=[
    {label:'State',w:130},{label:'T-Mo Overall',w:90},
    {label:'B2 (1900)',w:85},{label:'B4/66 (AWS)',w:85},{label:'B5 (850)',w:75},
    {label:'B12 (700)',w:80},{label:'B71 (600)',w:80},{label:'B41 (2500)',w:85},
    {label:'Density',w:70}
  ];
  var totalW=cols.reduce(function(s,c){return s+c.w},0);
  var totalH=HDR_H+states.length*ROW_H+2;

  var cvs=document.createElement('canvas');
  cvs.width=totalW*DPR;cvs.height=totalH*DPR;
  cvs.style.width=totalW+'px';cvs.style.height=totalH+'px';
  var ctx=cvs.getContext('2d');ctx.scale(DPR,DPR);

  // Header
  ctx.fillStyle='#1565C0';ctx.fillRect(0,0,totalW,HDR_H);
  ctx.font=HDR_FONT;ctx.fillStyle='#fff';ctx.textBaseline='middle';
  var hx=0;cols.forEach(function(c){ctx.fillText(c.label,hx+4,HDR_H/2);hx+=c.w});

  // Rows
  var ratingColor=function(r){return r==='Strong'?'#4CAF50':r==='Moderate'||r==='Limited'?'#FF9800':r==='Weak'?'#F44336':'#9E9E9E'};
  states.forEach(function(st,i){
    var y=HDR_H+i*ROW_H;
    var isSelected=selectedState===st.s;
    ctx.fillStyle=isSelected?'#E3F2FD':i%2===0?'#fff':'#f5f5f5';
    ctx.fillRect(0,y,totalW,ROW_H);
    ctx.strokeStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(0,y+ROW_H);ctx.lineTo(totalW,y+ROW_H);ctx.stroke();

    var ty=y+ROW_H/2;var cx=0;
    var vals=[st.s,st.ov,st.b2,st.b4,st.b5,st.b12,st.b71,st.b41,st.ur];
    cols.forEach(function(col,ci){
      ctx.font=FONT;ctx.textBaseline='middle';
      if(ci===0){
        ctx.fillStyle=isSelected?'#0D47A1':'#212121';ctx.font='bold '+FONT;
        ctx.fillText(vals[ci],cx+4,ty);
      }else if(ci>=1&&ci<=7){
        var r=vals[ci];
        // Dot
        ctx.fillStyle=ratingColor(r);
        ctx.beginPath();ctx.arc(cx+12,ty,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#212121';ctx.font='12px "Segoe UI", sans-serif';
        ctx.fillText(r,cx+20,ty);
      }else{
        ctx.fillStyle='#212121';ctx.fillText(vals[ci],cx+4,ty);
      }
      cx+=col.w;
    });
  });

  return{canvas:cvs,rowH:ROW_H,hdrH:HDR_H,totalW:totalW};
}

// ==================== RENDER ====================
function render(){
  var content=document.getElementById('mainContent');
  var tabBar=document.getElementById('tabBar');
  var ph=getPhone(currentPhone);

  // Tabs
  var tabs=[{id:'us',label:'US Carriers'},{id:'ca',label:'Canada Carriers'},{id:'states',label:'US States'},{id:'sources',label:'Sources'},{id:'ca-deep',label:'\u{1F1E8}\u{1F1E6} Canada Deep Dive',href:'canada.html'}];
  tabBar.innerHTML='';
  tabs.forEach(function(t){
    if(t.href){
      var a=document.createElement('a');a.className='tab-btn';a.href=t.href;a.textContent=t.label;
      a.style.textDecoration='none';a.style.color='rgba(255,255,255,0.9)';a.style.fontWeight='600';
      tabBar.appendChild(a);
    }else{
      var btn=document.createElement('button');
      btn.className='tab-btn'+(currentTab===t.id?' active':'');
      btn.textContent=t.label;
      btn.onclick=function(){currentTab=t.id;netFilter='All';filterText='';selectedState=null;render()};
      tabBar.appendChild(btn);
    }
  });

  var html='';

  // Phone selector
  if(currentTab!=='sources'){
    html+='<div class="card" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">';
    html+='<span style="font-weight:600;font-size:14px;color:#212121">Select Phone:</span>';
    phones.forEach(function(p){
      var active=currentPhone===p.i;
      html+='<button class="phone-btn'+(active?' active':'')+'" data-phone="'+p.i+'">'+p.n+'<small>'+p.m+'</small></button>';
    });
    html+='</div>';

    // Info bar
    html+='<div class="info-bar">';
    html+='<span><b>LTE Bands:</b> '+ph.l.map(function(b){return'B'+b}).join(', ')+'</span>';
    html+='<span><b>UMTS:</b> '+ph.u.map(function(b){return'B'+b}).join(', ')+'</span>';
    html+='<span><b>Origin:</b> '+ph.o+'</span>';
    html+='<span style="color:#616161">Source: '+ph.s+'</span>';
    html+='</div>';
  }

  // Carrier tables
  if(currentTab==='us'||currentTab==='ca'){
    var carriers=currentTab==='us'?usCarriers:caCarriers;
    var networks=['All'];var seen={};
    carriers.forEach(function(c){if(!seen[c.net]){seen[c.net]=1;networks.push(c.net)}});

    html+='<div class="card" style="display:flex;gap:16px;align-items:center">';
    html+='<input class="filter-input" placeholder="Search carrier..." id="filterInput" value="'+filterText+'">';
    html+='<span style="font-size:13px;font-weight:600">Network:</span>';
    html+='<select class="net-select" id="netSelect">';
    networks.forEach(function(n){html+='<option value="'+n+'"'+(netFilter===n?' selected':'')+'>'+n+'</option>'});
    html+='</select>';

    var filtered=carriers.filter(function(c){
      if(filterText&&c.name.toLowerCase().indexOf(filterText.toLowerCase())===-1)return false;
      if(netFilter!=='All'&&c.net!==netFilter)return false;return true;
    });
    html+='<span style="font-size:12px;color:#616161;margin-left:auto">'+filtered.length+' carriers shown</span>';
    html+='</div>';

    html+='<div class="canvas-wrap" id="carrierCanvasWrap"></div>';
  }

  // States
  if(currentTab==='states'){
    html+='<div class="card" style="font-size:13px;color:#616161">Click any state row to see per-phone breakdown below.</div>';
    html+='<div class="canvas-wrap" id="stateCanvasWrap" style="cursor:pointer"></div>';

    if(selectedState){
      var st=usStates.find(function(s){return s.s===selectedState});
      if(st){
        var bandMap={b2:2,b4:4,b5:5,b12:12,b71:71,b41:41};
        var strongBands=[];var modBands=[];
        ['b2','b4','b5','b12','b71','b41'].forEach(function(k){
          if(st[k]==='Strong')strongBands.push(bandMap[k]);
          else if(st[k]==='Moderate'||st[k]==='Limited')modBands.push(bandMap[k]);
        });
        var availBands=strongBands.concat(modBands);
        var tmoCarriers=usCarriers.filter(function(c){return c.net==='T-Mobile'||c.net==='T-Mobile+'});

        html+='<div class="state-detail">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center">';
        html+='<h3>'+selectedState+' — Carrier Recommendations</h3>';
        html+='<button class="close-btn" id="closeState">Close</button></div>';
        html+='<div style="margin:16px 0;padding:10px 14px;background:#f5f5f5;font-size:13px">';
        html+='<b>T-Mobile coverage:</b> '+st.ov+' | <b>Density:</b> '+st.ur;
        html+=' | <b>Strong bands:</b> '+(strongBands.length?strongBands.map(function(b){return'B'+b}).join(', '):'None');
        html+=' | <b>Moderate bands:</b> '+(modBands.length?modBands.map(function(b){return'B'+b}).join(', '):'None');
        html+='</div>';

        html+='<div style="display:flex;gap:12px;flex-wrap:wrap">';
        phones.forEach(function(p){
          var phoneHits=availBands.filter(function(b){return p.l.indexOf(b)!==-1});
          var strongHits=strongBands.filter(function(b){return p.l.indexOf(b)!==-1});
          var score=strongHits.length*2+(phoneHits.length-strongHits.length);
          var maxScore=strongBands.length*2+modBands.length;
          var pct=maxScore>0?Math.round(score/maxScore*100):0;
          var rating=pct>=50?'Good':pct>=20?'Marginal':'Poor';
          var badgeCls=rating==='Good'?'badge-good':rating==='Marginal'?'badge-marginal':'badge-poor';

          var reasons=[];
          if(strongHits.length>0)reasons.push('Hits strong bands: '+strongHits.map(function(b){return'B'+b}).join(', '));
          if(phoneHits.length===0)reasons.push('No band overlap in this state');
          if(p.l.indexOf(12)===-1)reasons.push('Missing B12 (indoor/rural)');
          if(p.l.indexOf(71)===-1)reasons.push('Missing B71 (rural backbone)');
          if(p.l.indexOf(5)!==-1&&st.b5!=='None')reasons.push('B5 overlap helps');

          var topCarriers=tmoCarriers.slice(0,5).map(function(c){
            var m=getMatch(p.l,c.bands);return{name:c.name,type:c.type,pct:m.pct};
          }).sort(function(a,b){return b.pct-a.pct});

          html+='<div class="phone-card">';
          html+='<div class="phone-card-name">'+p.n+'</div>';
          html+='<div class="badge '+badgeCls+'">'+rating+' ('+pct+'%)</div>';
          reasons.forEach(function(r){html+='<div class="reason">- '+r+'</div>'});
          html+='<div style="font-size:12px;font-weight:600;margin:8px 0 4px">Top carriers:</div>';
          topCarriers.forEach(function(tc){
            var bg2=tc.pct>=40?'#E8F5E9':tc.pct>=12?'#FFF3E0':'#FFEBEE';
            var fg2=tc.pct>=40?'#4CAF50':tc.pct>=12?'#FF9800':'#F44336';
            html+='<div class="carrier-row"><span>'+tc.name+' <span style="color:#616161">('+tc.type+')</span></span>';
            html+='<span class="pct-badge" style="background:'+bg2+';color:'+fg2+'">'+tc.pct+'%</span></div>';
          });
          html+='</div>';
        });
        html+='</div></div>';
      }
    }
  }

  // Sources
  if(currentTab==='sources'){
    html+='<div class="card src-section">';
    html+='<h3>Phone Band Sources</h3>';
    phones.forEach(function(p){
      html+='<div><b>'+p.n+' ('+p.m+'):</b> LTE '+p.l.map(function(b){return'B'+b}).join(', ')+' — Source: '+p.s+'</div>';
    });
    html+='<h3 style="margin-top:20px">Carrier Band Sources</h3>';
    ['T-Mobile US: Official carrier documentation; FrequencyCheck.com',
     'All T-Mobile MVNOs share identical tower infrastructure.',
     'AT&T: Official carrier documentation; FrequencyCheck.com',
     'Verizon: Official carrier documentation; FrequencyCheck.com',
     'Rogers: Official carrier documentation; FrequencyCheck.com',
     'Bell: Official carrier documentation; FrequencyCheck.com',
     'Telus: Official carrier documentation; FrequencyCheck.com',
     'Freedom / SaskTel / Eastlink / Videotron: Official carrier documentation'
    ].forEach(function(s){html+='<div>'+s+'</div>'});
    html+='<h3 style="margin-top:20px">Coverage Data Sources</h3>';
    ['US state coverage: T-Mobile coverage map (t-mobile.com/coverage/coverage-map)',
     'T-Mobile band analysis: OneSDR.com/t-mobile-frequency-bands/',
     'US carrier bands: MyAmplifiers.com; Kimovil.com; PhoneArena.com',
     'Canada coverage: WhistleOut.ca; comparecellular.ca; planhub.ca',
     'Canada bands: SmartphonePlans.ca; FrequencyCheck.com',
     'Telus covers 99% of Canadian population. Bell/Telus share towers.',
     'Rogers covers 97% of Canadian population.',
     'Data compiled March 2026.'
    ].forEach(function(s){html+='<div>'+s+'</div>'});
    html+='</div>';
  }

  // Footer
  html+='<div class="footer">';
  html+='KEITEX Telecomms — Carrier Band Compatibility Checker — Data compiled March 2026';
  html+='<i>Prepared by KEITEX Research Department — Senior Data Analyst Jesse Ashida</i>';
  html+='</div>';

  content.innerHTML=html;

  // Bind phone buttons
  document.querySelectorAll('[data-phone]').forEach(function(btn){
    btn.onclick=function(){currentPhone=this.getAttribute('data-phone');render()};
  });

  // Bind filter
  var filterInput=document.getElementById('filterInput');
  if(filterInput){
    filterInput.oninput=function(){filterText=this.value;renderCarrierCanvasInPlace()};
    filterInput.focus();filterInput.setSelectionRange(filterText.length,filterText.length);
  }
  var netSelect=document.getElementById('netSelect');
  if(netSelect)netSelect.onchange=function(){netFilter=this.value;renderCarrierCanvasInPlace()};

  // Bind close
  var closeBtn=document.getElementById('closeState');
  if(closeBtn)closeBtn.onclick=function(){selectedState=null;render()};

  // Render canvases
  renderCarrierCanvasInPlace();
  renderStateCanvasInPlace();
}

function renderCarrierCanvasInPlace(){
  var wrap=document.getElementById('carrierCanvasWrap');
  if(!wrap)return;
  var carriers=currentTab==='us'?usCarriers:caCarriers;
  var ph=getPhone(currentPhone);
  var result=renderCarrierCanvas(carriers,ph.l);
  wrap.innerHTML='';
  wrap.appendChild(result.canvas);

  // Update count
  var countSpan=document.querySelector('.card span[style*="margin-left:auto"]');
  if(countSpan)countSpan.textContent=result.count+' carriers shown';
}

function renderStateCanvasInPlace(){
  var wrap=document.getElementById('stateCanvasWrap');
  if(!wrap)return;
  var ph=getPhone(currentPhone);
  var result=renderStateCanvas(usStates,ph.l);
  wrap.innerHTML='';
  wrap.appendChild(result.canvas);

  // Click handler on canvas
  result.canvas.onclick=function(e){
    var rect=result.canvas.getBoundingClientRect();
    var y=e.clientY-rect.top;
    if(y<result.hdrH)return;
    var idx=Math.floor((y-result.hdrH)/result.rowH);
    if(idx>=0&&idx<usStates.length){
      var clicked=usStates[idx].s;
      selectedState=selectedState===clicked?null:clicked;
      render();
    }
  };
}

// Init
render();

// DevTools detection (debugger-based)
(function(){
  var devOpen=false;
  var el=new Image();
  Object.defineProperty(el,'id',{get:function(){devOpen=true}});
  setInterval(function(){
    devOpen=false;
    console.log('%c','',el);
    if(devOpen){
      document.body.style.opacity='0.15';
      document.body.style.pointerEvents='none';
    }else{
      document.body.style.opacity='1';
      document.body.style.pointerEvents='auto';
    }
  },2000);
})();
</script>
